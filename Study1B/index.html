///function to update the scoreboard
function updateScoreboard() {
  const scores = computeScores();
  document.getElementById("sp1-count").textContent = scores.sp1;
  document.getElementById("sp2-count").textContent = scores.sp2;
}

function getAnchorPoint(playerId) {
  const elem = document.getElementById(playerId);
  const rect = elem.getBoundingClientRect();
  const containerRect = document.getElementById("cyberball-container").getBoundingClientRect();
  const anchor = PLAYER_ANCHORS[playerId];

  return {
    x: rect.left - containerRect.left + rect.width * anchor.x - 5,
    y: rect.top  - containerRect.top  + rect.height * anchor.y - 5
  };
}

const THROW_FRAMES = [
  "../Images/throw-1.png",
  "../Images/throw-2.png",
  "../Images/throw-3.png",
  "../Images/throw-4.png"
];

const THROW_FRAME_DURATION = 60;
const ball_travel_time = 1500;

function animateThrowFrames(fromId, toId, callback) {
  const ball = document.getElementById("Ball");
  const fromElem = document.getElementById(fromId);
  const toElem = document.getElementById(toId);

  const start = getAnchorPoint(fromId);
  const end = getAnchorPoint(toId);

  const startTime = performance.now();

  fromElem.style.transform = (end.x < start.x) ? "scaleX(-1)" : "scaleX(1)";

  ball.style.display = "block";
  ball.style.left = start.x + "px";
  ball.style.top  = start.y + "px";

  function step(now) {
    const t = Math.min((now - startTime)/ball_travel_time, 1);
    const eased = t*(2-t);

    ball.style.left = start.x + (end.x-start.x)*eased + "px";
    ball.style.top  = start.y + (end.y-start.y)*eased + "px";

    const frameIndex = Math.min(
      Math.floor((now - startTime)/THROW_FRAME_DURATION),
      THROW_FRAMES.length-1
    );
    fromElem.src = THROW_FRAMES[frameIndex];

    if(t < 1){
      requestAnimationFrame(step);
    } else {
      finish();
    }
  }

  function finish(){
    ///need to flip the image
    fromElem.style.transform = "scaleX(1)";

    fromElem.src = (fromId === "SP2") ? "../Images/idle-left.png" : "../Images/idle-right.png";

    toElem.src = (toId === "SP2") ? "../Images/catch2left.png" : "../Images/catch2right.png";

    setTimeout(()=>{
      ball.style.display = "none";
      toElem.src = (toId === "SP2") ? "../Images/idle-left.png" : "../Images/idle-right.png";
      callback();
    }, 700);
  }

  requestAnimationFrame(step);
}

///function to create a throw trial
function throw_trial(obj){
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: cyberball_display.stimulus,
    choices: "NO_KEYS",
    trial_duration: null,

    data: {
      task: "cyberball",
      from: obj.from,
      to: obj.to
    },

    on_load: function(){

      document.getElementById("scoreboard").style.display = "block";

      setTimeout(()=>{
        animateThrowFrames(obj.from, obj.to, ()=>{
          
          jsPsych.finishTrial(obj);
        });
      }, 1200);
    },
    on_finish: function(data){
      // update current ball holder for scoreboard display
      currentHolder = obj.to;
      document.getElementById("current-holder").textContent = currentHolder;

      setTimeout(updateScoreboard, 10); // update scoreboard shortly after each throw
      data.from = obj.from;
      data.to = obj.to;

      data.task = "cyberball";

    }
  };
}
///function to compute scores at the end of the game
function computeScores() {
  const data = jsPsych.data.get().filter({task: "cyberball"}).values();

  let sp1 = 0;
  let sp2 = 0;

  data.forEach(trial => {
    if(trial.to === "Treasurer") {
      if(trial.from === "SP1") sp1++;
      if(trial.from === "SP2") sp2++;
    }
  });

  return { sp1, sp2 };
}

  const PausePoints = [4, 10, 22];

  if(PausePoints.includes(i)){
    survey_block++; //increment survey block number (for data logging) each time we hit a pause point

    let sp1_score = 0;

        if (t.from === "SP2") sp2_score++;
      }

      [`sp2_points_block${current_block}`]: sp2_score,

    });
